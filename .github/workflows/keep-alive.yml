name: Keep Render Alive

on:
  schedule:
    # Every 14 minutes to prevent Render free tier from sleeping
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          curl -fsS --max-time 30 --retry 3 --retry-delay 5 \
            "https://resumee-6xu3.onrender.com/api/v1/health" \
            && echo "Server is awake" \
            || echo "Ping failed, server may be starting up"
