services:
  - type: web
    name: resume-matcher-api
    runtime: python
    region: oregon
    rootDir: apps/backend
    buildCommand: ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
    healthCheckPath: /api/v1/health
    plan: starter
