services:
  - type: web
    name: resume-matcher-api
    runtime: docker
    region: oregon
    rootDir: apps/backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8000"
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
    healthCheckPath: /api/v1/health
    plan: starter
